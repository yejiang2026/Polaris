<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            color: #fff;
            font-size: 1.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .score {
            flex: 1;
            text-align: center;
        }

        .score-label {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff00;
        }

        canvas {
            display: block;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .controls {
            color: #fff;
            text-align: center;
            font-size: 0.9em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .controls p {
            margin: 5px 0;
        }

        .game-status {
            color: #ffff00;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            min-height: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score">
                <div class="score-label">PLAYER</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score" style="border-left: 2px solid #fff; border-right: 2px solid #fff;">
                <div class="score-label">VS</div>
                <div class="score-value" style="font-size: 1.5em; color: #ff6b6b;">COMPUTER</div>
            </div>
            <div class="score">
                <div class="score-label">COMPUTER</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="game-status" id="gameStatus"></div>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Move Mouse or ⬆️⬇️ Arrow Keys - Control Left Paddle</p>
            <p>🤖 Computer Controls Right Paddle</p>
            <p>🔄 Press SPACE to Start / Restart</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game objects
        const paddle = {
            width: 10,
            height: 80,
            speed: 6,
            x: 20,
            y: canvas.height / 2 - 40
        };

        const computer = {
            width: 10,
            height: 80,
            speed: 4.5,
            x: canvas.width - 30,
            y: canvas.height / 2 - 40
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            speedX: 5,
            speedY: 5,
            maxSpeed: 8
        };

        let playerScore = 0;
        let computerScore = 0;
        let gameRunning = false;
        let mouseY = canvas.height / 2;

        // Input handling
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ') {
                e.preventDefault();
                gameRunning = !gameRunning;
                updateGameStatus();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Draw functions
        function drawPaddle(x, y) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, paddle.width, paddle.height);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, paddle.width, paddle.height);
        }

        function drawComputer(x, y) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, y, computer.width, computer.height);
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, computer.width, computer.height);
        }

        function drawBall(x, y, radius) {
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawCenterLine() {
            ctx.strokeStyle = '#ffffff';
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawScore() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        function updateGameStatus() {
            const status = document.getElementById('gameStatus');
            if (gameRunning) {
                status.textContent = '▶️ GAME RUNNING';
                status.style.color = '#00ff00';
            } else {
                status.textContent = '⏸️ PRESS SPACE TO START';
                status.style.color = '#ffff00';
            }
        }

        // Update functions
        function updatePaddle() {
            // Mouse control
            if (mouseY - paddle.height / 2 > 0 && mouseY - paddle.height / 2 < canvas.height - paddle.height) {
                paddle.y = mouseY - paddle.height / 2;
            }

            // Keyboard control (arrow keys override mouse slightly)
            if (keys['ArrowUp'] && paddle.y > 0) {
                paddle.y -= paddle.speed;
            }
            if (keys['ArrowDown'] && paddle.y < canvas.height - paddle.height) {
                paddle.y += paddle.speed;
            }

            // Keep paddle in bounds
            paddle.y = Math.max(0, Math.min(paddle.y, canvas.height - paddle.height));
        }

        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // AI follows the ball
            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Keep computer in bounds
            computer.y = Math.max(0, Math.min(computer.y, canvas.height - computer.height));
        }

        function updateBall() {
            if (!gameRunning) return;

            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Wall collision (top and bottom)
            if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= canvas.height) {
                ball.speedY = -ball.speedY;
                ball.y = Math.max(ball.radius, Math.min(ball.y, canvas.height - ball.radius));
            }

            // Paddle collision (left)
            if (ball.x - ball.radius < paddle.x + paddle.width &&
                ball.y > paddle.y &&
                ball.y < paddle.y + paddle.height) {
                ball.speedX = -ball.speedX;
                ball.x = paddle.x + paddle.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
                ball.speedY += hitPos * 3;
                ball.speedY = Math.max(-ball.maxSpeed, Math.min(ball.speedY, ball.maxSpeed));
            }

            // Paddle collision (right)
            if (ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height) {
                ball.speedX = -ball.speedX;
                ball.x = computer.x - ball.radius;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.speedY += hitPos * 3;
                ball.speedY = Math.max(-ball.maxSpeed, Math.min(ball.speedY, ball.maxSpeed));
            }

            // Score points
            if (ball.x < 0) {
                computerScore++;
                resetBall();
                drawScore();
            } else if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
                drawScore();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.speedY = (Math.random() * 2 - 1) * 5;
            gameRunning = false;
            updateGameStatus();
        }

        // Main game loop
        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawCenterLine();
            drawPaddle(paddle.x, paddle.y);
            drawComputer(computer.x, computer.y);
            drawBall(ball.x, ball.y, ball.radius);

            // Update game state
            updatePaddle();
            updateComputer();
            updateBall();

            requestAnimationFrame(gameLoop);
        }

        // Initialize
        drawScore();
        updateGameStatus();
        gameLoop();
    </script>
</body>
</html>
