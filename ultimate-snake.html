<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>终极版贪吃蛇</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101117;
      --panel: #181b22;
      --panel-2: #20242d;
      --line: #313743;
      --text: #f5f1e8;
      --muted: #a9b0ba;
      --lime: #8ee46b;
      --cyan: #58d6dc;
      --gold: #ffd166;
      --red: #ff6b6b;
      --violet: #b78cff;
      --shadow: rgba(0, 0, 0, .35);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 14% 12%, rgba(88, 214, 220, .08), transparent 32rem),
        radial-gradient(circle at 88% 20%, rgba(255, 209, 102, .08), transparent 28rem),
        linear-gradient(135deg, #11131a 0%, #0b0d11 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: min(1240px, 100%);
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 280px;
      gap: 14px;
      align-items: stretch;
    }

    .panel {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 60px var(--shadow);
    }

    .sidebar, .rightbar {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 620px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: conic-gradient(from 220deg, var(--lime), var(--cyan), var(--gold), var(--lime));
      border-radius: 8px;
      color: #101117;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(142, 228, 107, .24);
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 3px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .control-group {
      display: grid;
      gap: 8px;
    }

    .control-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: #101218;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px;
    }

    .segmented button, .icon-button, .command {
      border: 0;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, color .12s ease, box-shadow .12s ease;
    }

    .segmented button {
      min-height: 34px;
      background: transparent;
      font-size: 13px;
      white-space: nowrap;
    }

    .segmented button.active {
      background: var(--lime);
      color: #101117;
      font-weight: 800;
    }

    .command {
      min-height: 42px;
      width: 100%;
      background: var(--cyan);
      color: #091014;
      font-weight: 800;
      box-shadow: 0 10px 26px rgba(88, 214, 220, .22);
    }

    .command.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 13px;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #3a404b;
      border-radius: 99px;
      cursor: pointer;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform .18s ease;
    }

    .switch input:checked + .slider {
      background: var(--lime);
    }

    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }

    .stage-wrap {
      position: relative;
      min-height: 620px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .status {
      min-width: 0;
    }

    .status h2 {
      font-size: 18px;
      line-height: 1.2;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 8px;
      background: #101218;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .game-shell {
      position: relative;
      width: 100%;
      min-height: 0;
      aspect-ratio: 1 / 1;
      max-height: min(74vh, 760px);
      justify-self: center;
      align-self: center;
      background: #0d1014;
      border: 1px solid #3b444f;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 55px rgba(0,0,0,.36);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(10, 12, 16, .62);
      backdrop-filter: blur(8px);
      transition: opacity .18s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 27, 34, .95);
      padding: 18px;
      text-align: center;
      box-shadow: 0 20px 70px rgba(0,0,0,.45);
    }

    .modal h2 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .touch-pad {
      display: none;
      width: 156px;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 6px;
      justify-content: center;
      margin: 0 auto;
    }

    .touch-pad button {
      min-width: 48px;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 19px;
      font-weight: 800;
    }

    .touch-pad .empty {
      visibility: hidden;
    }

    .legend {
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 30px;
      font-size: 13px;
      color: var(--muted);
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.28);
    }

    .swatch.food { background: var(--gold); }
    .swatch.speed { background: var(--cyan); }
    .swatch.shield { background: var(--violet); }
    .swatch.portal { background: var(--lime); }
    .swatch.danger { background: var(--red); }

    .mini {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .events {
      display: grid;
      gap: 8px;
      min-height: 144px;
    }

    .event {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11141a;
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cyan);
    }

    .power-list {
      display: grid;
      gap: 8px;
    }

    .meter {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #11141a;
    }

    .meter-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .bar {
      height: 7px;
      background: #303642;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--lime);
      transition: width .1s linear;
    }

    .kbd {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 5px;
      background: #101218;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      body { padding: 10px; }
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar, .rightbar, .stage-wrap {
        min-height: auto;
      }
      .sidebar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .brand, .stats {
        grid-column: 1 / -1;
      }
      .rightbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .touch-pad {
        display: grid;
      }
    }

    @media (max-width: 620px) {
      .sidebar, .rightbar {
        display: flex;
      }
      .stage-wrap {
        padding: 10px;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .badges {
        justify-content: flex-start;
      }
      .game-shell {
        max-height: none;
      }
      .modal h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="终极版贪吃蛇">
    <aside class="panel sidebar">
      <section class="brand">
        <div class="mark">S</div>
        <div>
          <h1>终极版贪吃蛇</h1>
          <p class="sub">吃、躲、冲刺、穿门，活到最后一格。</p>
        </div>
      </section>

      <section class="stats" aria-label="分数">
        <div class="stat">
          <span class="label">分数</span>
          <strong class="value" id="score">0</strong>
        </div>
        <div class="stat">
          <span class="label">最高</span>
          <strong class="value" id="best">0</strong>
        </div>
        <div class="stat">
          <span class="label">长度</span>
          <strong class="value" id="length">3</strong>
        </div>
        <div class="stat">
          <span class="label">连击</span>
          <strong class="value" id="combo">x1</strong>
        </div>
      </section>

      <section class="control-group">
        <span class="label">模式</span>
        <div class="segmented" id="modeButtons">
          <button data-mode="classic">经典</button>
          <button data-mode="quest" class="active">终极</button>
          <button data-mode="zen">禅意</button>
        </div>
      </section>

      <section class="control-group">
        <span class="label">难度</span>
        <div class="segmented" id="difficultyButtons">
          <button data-difficulty="easy">稳</button>
          <button data-difficulty="normal" class="active">准</button>
          <button data-difficulty="hard">狠</button>
        </div>
      </section>

      <section class="control-group">
        <button class="command" id="startBtn">开始</button>
        <div class="control-row">
          <button class="command secondary" id="pauseBtn">暂停</button>
          <button class="icon-button" id="muteBtn" title="声音">♪</button>
          <button class="icon-button" id="resetBtn" title="重开">↻</button>
        </div>
      </section>

      <label class="toggle">
        <span>墙壁穿越</span>
        <span class="switch">
          <input type="checkbox" id="wrapToggle">
          <span class="slider"></span>
        </span>
      </label>
    </aside>

    <section class="panel stage-wrap">
      <div class="topbar">
        <div class="status">
          <h2 id="statusTitle">准备出发</h2>
          <p class="sub" id="statusText">方向键或 WASD 控制，空格暂停。</p>
        </div>
        <div class="badges">
          <span class="badge" id="levelBadge">第 1 关</span>
          <span class="badge" id="speedBadge">速度 1.0x</span>
          <span class="badge" id="goalBadge">目标 5</span>
        </div>
      </div>

      <div class="game-shell" id="gameShell">
        <canvas id="game" width="900" height="900"></canvas>
        <div class="overlay" id="overlay">
          <div class="modal">
            <h2 id="overlayTitle">终极蛇已上线</h2>
            <p id="overlayText">吃金苹果涨分，拿护盾冲障碍，穿传送门反杀局面。点开始就进场。</p>
            <button class="command" id="overlayStart">开始游戏</button>
          </div>
        </div>
      </div>

      <div class="touch-pad" aria-label="触屏方向键">
        <span class="empty"></span>
        <button data-dir="up">↑</button>
        <span class="empty"></span>
        <button data-dir="left">←</button>
        <span class="empty"></span>
        <button data-dir="right">→</button>
        <span class="empty"></span>
        <button data-dir="down">↓</button>
        <span class="empty"></span>
      </div>
    </section>

    <aside class="panel rightbar">
      <section>
        <span class="label">道具</span>
        <div class="legend">
          <div class="legend-item"><span class="swatch food"></span><span>金苹果</span><b>+10</b></div>
          <div class="legend-item"><span class="swatch speed"></span><span>疾风</span><b>加速</b></div>
          <div class="legend-item"><span class="swatch shield"></span><span>护盾</span><b>保命</b></div>
          <div class="legend-item"><span class="swatch portal"></span><span>传送门</span><b>跳跃</b></div>
          <div class="legend-item"><span class="swatch danger"></span><span>尖刺</span><b>危险</b></div>
        </div>
      </section>

      <section>
        <span class="label">状态</span>
        <div class="power-list" id="powerList">
          <div class="meter">
            <div class="meter-top"><span>护盾</span><span id="shieldText">0%</span></div>
            <div class="bar"><span id="shieldBar"></span></div>
          </div>
          <div class="meter">
            <div class="meter-top"><span>疾风</span><span id="speedText">0%</span></div>
            <div class="bar"><span id="boostBar"></span></div>
          </div>
        </div>
      </section>

      <section>
        <span class="label">操作</span>
        <p class="mini"><span class="kbd">↑</span> <span class="kbd">↓</span> <span class="kbd">←</span> <span class="kbd">→</span> 或 <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span></p>
        <p class="mini"><span class="kbd">Space</span> 暂停，<span class="kbd">R</span> 重开，移动端可滑动。</p>
      </section>

      <section>
        <span class="label">战况</span>
        <div class="events" id="events"></div>
      </section>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const shell = document.getElementById("gameShell");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const lengthEl = document.getElementById("length");
    const comboEl = document.getElementById("combo");
    const statusTitle = document.getElementById("statusTitle");
    const statusText = document.getElementById("statusText");
    const levelBadge = document.getElementById("levelBadge");
    const speedBadge = document.getElementById("speedBadge");
    const goalBadge = document.getElementById("goalBadge");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const shieldBar = document.getElementById("shieldBar");
    const boostBar = document.getElementById("boostBar");
    const shieldText = document.getElementById("shieldText");
    const speedText = document.getElementById("speedText");
    const eventsEl = document.getElementById("events");
    const wrapToggle = document.getElementById("wrapToggle");
    const muteBtn = document.getElementById("muteBtn");

    const grid = 28;
    const cell = canvas.width / grid;
    const difficulties = {
      easy: { start: 122, step: 4, obstacles: 8, label: "稳" },
      normal: { start: 100, step: 6, obstacles: 14, label: "准" },
      hard: { start: 82, step: 8, obstacles: 22, label: "狠" }
    };

    let mode = "quest";
    let difficulty = "normal";
    let best = Number(localStorage.getItem("ultimateSnakeBest") || 0);
    let snake, dir, nextDir, food, specials, obstacles, portals, particles, floatingTexts;
    let score, level, eatenInLevel, combo, comboTimer, tickMs, lastStep, running, paused, gameOver;
    let shieldUntil, boostUntil, portalCooldown, muted, audioCtx, nextSpecialAt;

    function resetState() {
      const mid = Math.floor(grid / 2);
      snake = [{ x: mid, y: mid }, { x: mid - 1, y: mid }, { x: mid - 2, y: mid }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = null;
      specials = [];
      obstacles = [];
      portals = [];
      particles = [];
      floatingTexts = [];
      score = 0;
      level = 1;
      eatenInLevel = 0;
      combo = 1;
      comboTimer = 0;
      tickMs = difficulties[difficulty].start;
      lastStep = 0;
      running = false;
      paused = false;
      gameOver = false;
      shieldUntil = 0;
      boostUntil = 0;
      portalCooldown = 0;
      nextSpecialAt = 3;
      buildLevel();
      spawnFood();
      updateUi();
      logEvent("准备完成", "#58d6dc");
    }

    function buildLevel() {
      obstacles = [];
      portals = [];
      if (mode === "classic" || mode === "zen") return;

      const count = difficulties[difficulty].obstacles + Math.floor(level * 2.4);
      const centerSafe = new Set();
      for (let y = 11; y <= 16; y++) {
        for (let x = 9; x <= 18; x++) centerSafe.add(key({ x, y }));
      }

      let attempts = 0;
      while (obstacles.length < count && attempts < 600) {
        attempts++;
        const o = { x: rand(2, grid - 3), y: rand(2, grid - 3) };
        if (centerSafe.has(key(o)) || occupied(o)) continue;
        if ((o.x + o.y + level) % 5 === 0) {
          const line = Math.random() > .5 ? [{ x: o.x + 1, y: o.y }, { x: o.x - 1, y: o.y }] : [{ x: o.x, y: o.y + 1 }, { x: o.x, y: o.y - 1 }];
          if (line.every(p => inBounds(p) && !centerSafe.has(key(p)) && !occupied(p))) obstacles.push(o, ...line);
        } else {
          obstacles.push(o);
        }
      }

      const a = randomFreeCell();
      const b = randomFreeCell();
      if (a && b) portals = [a, b];
    }

    function randomFreeCell() {
      for (let i = 0; i < 900; i++) {
        const p = { x: rand(1, grid - 2), y: rand(1, grid - 2) };
        if (!occupied(p)) return p;
      }
      return null;
    }

    function occupied(p) {
      return snake?.some(s => same(s, p)) || obstacles.some(o => same(o, p)) || specials.some(s => same(s, p)) || portals.some(o => same(o, p)) || (food && same(food, p));
    }

    function spawnFood() {
      food = randomFreeCell();
    }

    function maybeSpawnSpecial() {
      if (mode === "classic") return;
      if (eatenInLevel < nextSpecialAt) return;
      if (specials.length >= 3) return;
      const types = mode === "zen" ? ["shield", "portal"] : ["speed", "shield", "bonus", "trap"];
      const type = types[rand(0, types.length - 1)];
      const p = randomFreeCell();
      if (!p) return;
      specials.push({ ...p, type, born: performance.now(), ttl: type === "trap" ? 8000 : 11000 });
      nextSpecialAt += rand(2, 4);
    }

    function startGame() {
      if (gameOver) resetState();
      running = true;
      paused = false;
      overlay.classList.add("hidden");
      statusTitle.textContent = "正在游走";
      statusText.textContent = "保持节奏，连吃会提高倍率。";
      tick(performance.now());
      beep(330, .06, "triangle");
    }

    function pauseGame(force) {
      if (!running || gameOver) return;
      paused = typeof force === "boolean" ? force : !paused;
      overlay.classList.toggle("hidden", !paused);
      if (paused) {
        overlayTitle.textContent = "已暂停";
        overlayText.textContent = "歇一口气。再点继续，蛇会从当前位置出发。";
        statusTitle.textContent = "暂停中";
      } else {
        statusTitle.textContent = "正在游走";
        lastStep = performance.now();
        tick(lastStep);
      }
      updateUi();
    }

    function restartGame() {
      resetState();
      overlay.classList.remove("hidden");
      overlayTitle.textContent = "重开一局";
      overlayText.textContent = "新地图已生成。点开始，刷新这条蛇的命运。";
    }

    function tick(now) {
      draw(now);
      if (!running || paused || gameOver) return;
      requestAnimationFrame(tick);
      const activeTick = Math.max(42, tickMs * (now < boostUntil ? .62 : 1));
      if (now - lastStep < activeTick) return;
      lastStep = now;
      step(now);
    }

    function step(now) {
      if (comboTimer && now > comboTimer) {
        combo = 1;
        comboTimer = 0;
      }
      specials = specials.filter(s => now - s.born < s.ttl);
      if (portalCooldown > 0) portalCooldown--;

      if (!(nextDir.x === -dir.x && nextDir.y === -dir.y)) dir = nextDir;
      let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      const wraps = wrapToggle.checked || mode === "zen";
      if (wraps) {
        head = { x: (head.x + grid) % grid, y: (head.y + grid) % grid };
      }

      const hitWall = !inBounds(head);
      const hitSelf = snake.some((s, index) => index > 0 && same(s, head));
      const obstacleIndex = obstacles.findIndex(o => same(o, head));
      const hitObstacle = obstacleIndex >= 0;

      if (hitWall || hitSelf || hitObstacle) {
        if (now < shieldUntil && !hitWall) {
          if (hitObstacle) obstacles.splice(obstacleIndex, 1);
          addBurst(snake[0], "#b78cff", 24);
          shieldUntil = 0;
          logEvent("护盾抵消撞击", "#b78cff");
          beep(190, .08, "sawtooth");
          updateUi();
          return;
        }
        endGame(hitWall ? "撞到边界" : hitSelf ? "撞到自己" : "撞上尖刺");
        return;
      }

      if (portalCooldown === 0 && portals.length === 2) {
        const idx = portals.findIndex(p => same(p, head));
        if (idx >= 0) {
          const other = portals[idx === 0 ? 1 : 0];
          head = { x: other.x + dir.x, y: other.y + dir.y };
          portalCooldown = 4;
          addBurst(other, "#8ee46b", 18);
          logEvent("传送成功", "#8ee46b");
          beep(520, .08, "sine");
        }
      }

      snake.unshift(head);
      let ate = food && same(head, food);
      if (ate) {
        eatFood(now);
      } else {
        snake.pop();
      }

      const specialIndex = specials.findIndex(s => same(s, head));
      if (specialIndex >= 0) {
        collectSpecial(specials.splice(specialIndex, 1)[0], now);
      }

      updateUi();
    }

    function eatFood(now) {
      eatenInLevel++;
      combo = Math.min(8, combo + 1);
      comboTimer = now + 2100;
      const gain = 10 * combo + level * 2;
      score += gain;
      addFloating(food, `+${gain}`, "#ffd166");
      addBurst(food, "#ffd166", 20);
      beep(430 + combo * 28, .05, "square");
      spawnFood();
      maybeSpawnSpecial();

      if (eatenInLevel >= goalForLevel()) {
        level++;
        eatenInLevel = 0;
        tickMs = Math.max(54, tickMs - difficulties[difficulty].step);
        nextSpecialAt = 2;
        buildLevel();
        spawnFood();
        addFloating(snake[0], `LEVEL ${level}`, "#58d6dc");
        logEvent(`进入第 ${level} 关`, "#58d6dc");
        beep(660, .1, "triangle");
      }
    }

    function collectSpecial(item, now) {
      if (item.type === "speed") {
        boostUntil = now + 5200;
        score += 25;
        addFloating(item, "疾风", "#58d6dc");
        addBurst(item, "#58d6dc", 18);
        logEvent("获得疾风", "#58d6dc");
        beep(760, .07, "sine");
      }
      if (item.type === "shield") {
        shieldUntil = now + 8000;
        score += 15;
        addFloating(item, "护盾", "#b78cff");
        addBurst(item, "#b78cff", 18);
        logEvent("护盾已激活", "#b78cff");
        beep(280, .09, "triangle");
      }
      if (item.type === "bonus") {
        const gain = 70 + level * 8;
        score += gain;
        combo = Math.min(8, combo + 2);
        comboTimer = now + 2500;
        addFloating(item, `+${gain}`, "#ffd166");
        addBurst(item, "#ffd166", 28);
        logEvent("吃到大奖励", "#ffd166");
        beep(880, .08, "square");
      }
      if (item.type === "trap") {
        if (now < shieldUntil) {
          shieldUntil = 0;
          addFloating(item, "抵消", "#b78cff");
          logEvent("护盾挡下陷阱", "#b78cff");
        } else {
          endGame("吃到毒刺");
        }
      }
    }

    function endGame(reason) {
      running = false;
      gameOver = true;
      overlay.classList.remove("hidden");
      overlayTitle.textContent = "本局结束";
      overlayText.textContent = `${reason}。最终分数 ${score}，长度 ${snake.length}。`;
      statusTitle.textContent = "本局结束";
      statusText.textContent = "按 R 或点击重开再冲一局。";
      if (score > best) {
        best = score;
        localStorage.setItem("ultimateSnakeBest", String(best));
        overlayText.textContent += " 新纪录！";
      }
      addBurst(snake[0], "#ff6b6b", 42);
      beep(120, .18, "sawtooth");
      updateUi();
    }

    function updateUi() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      lengthEl.textContent = snake.length;
      comboEl.textContent = `x${combo}`;
      levelBadge.textContent = `第 ${level} 关`;
      speedBadge.textContent = `速度 ${(difficulties[difficulty].start / Math.max(42, tickMs)).toFixed(1)}x`;
      goalBadge.textContent = `目标 ${goalForLevel() - eatenInLevel}`;
      const now = performance.now();
      const shieldPct = Math.max(0, Math.min(100, ((shieldUntil - now) / 8000) * 100));
      const boostPct = Math.max(0, Math.min(100, ((boostUntil - now) / 5200) * 100));
      shieldBar.style.width = `${shieldPct}%`;
      boostBar.style.width = `${boostPct}%`;
      shieldText.textContent = `${Math.round(shieldPct)}%`;
      speedText.textContent = `${Math.round(boostPct)}%`;
    }

    function draw(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      drawObstacles(now);
      drawPortals(now);
      drawFood(now);
      drawSpecials(now);
      drawSnake(now);
      drawParticles(now);
      drawFloating(now);
      if (running) updateUi();
    }

    function drawBoard() {
      ctx.fillStyle = "#0d1014";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(255,255,255,.045)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i++) {
        const p = Math.round(i * cell) + .5;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawSnake(now) {
      snake.forEach((part, index) => {
        const x = part.x * cell;
        const y = part.y * cell;
        const t = index / Math.max(1, snake.length - 1);
        ctx.fillStyle = index === 0 ? "#f5f1e8" : lerpColor("#8ee46b", "#2d9f89", t);
        roundedRect(x + 3, y + 3, cell - 6, cell - 6, index === 0 ? 10 : 8);
        ctx.fill();
        if (index === 0) {
          ctx.fillStyle = "#101117";
          const eyeA = { x: x + cell / 2 + dir.y * 7 + dir.x * 7, y: y + cell / 2 - dir.x * 7 + dir.y * 7 };
          const eyeB = { x: x + cell / 2 - dir.y * 7 + dir.x * 7, y: y + cell / 2 + dir.x * 7 + dir.y * 7 };
          ctx.beginPath();
          ctx.arc(eyeA.x, eyeA.y, 3.3, 0, Math.PI * 2);
          ctx.arc(eyeB.x, eyeB.y, 3.3, 0, Math.PI * 2);
          ctx.fill();
          if (now < shieldUntil) {
            ctx.strokeStyle = "rgba(183, 140, 255, .88)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x + cell / 2, y + cell / 2, cell * .54, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      });
    }

    function drawFood(now) {
      if (!food) return;
      const p = center(food);
      const pulse = Math.sin(now / 170) * 2;
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.arc(p.x, p.y, cell * .28 + pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff1b6";
      ctx.beginPath();
      ctx.arc(p.x - 5, p.y - 6, cell * .08, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSpecials(now) {
      specials.forEach(item => {
        const p = center(item);
        const life = 1 - ((now - item.born) / item.ttl);
        const r = cell * (.23 + Math.sin(now / 150) * .04);
        const colors = { speed: "#58d6dc", shield: "#b78cff", bonus: "#ffd166", trap: "#ff6b6b" };
        ctx.save();
        ctx.globalAlpha = Math.max(.25, life);
        ctx.fillStyle = colors[item.type];
        if (item.type === "trap") {
          drawSpike(p.x, p.y, r * 1.3);
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,.55)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.restore();
      });
    }

    function drawObstacles(now) {
      obstacles.forEach((o, i) => {
        const x = o.x * cell;
        const y = o.y * cell;
        ctx.fillStyle = i % 2 ? "#703846" : "#5e3340";
        roundedRect(x + 4, y + 4, cell - 8, cell - 8, 6);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 107, 107, .55)";
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }

    function drawPortals(now) {
      portals.forEach((p, i) => {
        const c = center(p);
        const r = cell * (.34 + Math.sin(now / 240 + i) * .05);
        ctx.strokeStyle = i === 0 ? "#8ee46b" : "#58d6dc";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(c.x, c.y, r, now / 380, now / 380 + Math.PI * 1.55);
        ctx.stroke();
      });
    }

    function drawParticles(now) {
      particles = particles.filter(p => now - p.born < p.ttl);
      particles.forEach(p => {
        const age = (now - p.born) / p.ttl;
        ctx.globalAlpha = 1 - age;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x + p.vx * age, p.y + p.vy * age, p.size * (1 - age), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function drawFloating(now) {
      floatingTexts = floatingTexts.filter(f => now - f.born < 900);
      floatingTexts.forEach(f => {
        const age = (now - f.born) / 900;
        ctx.globalAlpha = 1 - age;
        ctx.fillStyle = f.color;
        ctx.font = "800 24px Inter, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(f.text, f.x, f.y - age * 42);
        ctx.globalAlpha = 1;
      });
    }

    function addBurst(cellPos, color, amount) {
      const c = center(cellPos);
      for (let i = 0; i < amount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = rand(28, 86);
        particles.push({
          x: c.x,
          y: c.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: rand(3, 7),
          color,
          born: performance.now(),
          ttl: rand(360, 780)
        });
      }
    }

    function addFloating(pos, text, color) {
      const c = center(pos);
      floatingTexts.push({ x: c.x, y: c.y, text, color, born: performance.now() });
    }

    function logEvent(text, color) {
      const item = document.createElement("div");
      item.className = "event";
      item.innerHTML = `<span class="dot" style="background:${color}"></span><span>${text}</span>`;
      eventsEl.prepend(item);
      while (eventsEl.children.length > 4) eventsEl.lastElementChild.remove();
    }

    function changeDirection(newDir) {
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;
      nextDir = newDir;
    }

    function goalForLevel() {
      return mode === "classic" ? 999 : 4 + level;
    }

    function inBounds(p) {
      return p.x >= 0 && p.x < grid && p.y >= 0 && p.y < grid;
    }

    function same(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    function key(p) {
      return `${p.x},${p.y}`;
    }

    function center(p) {
      return { x: p.x * cell + cell / 2, y: p.y * cell + cell / 2 };
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSpike(x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 4;
        const rr = i % 2 === 0 ? r : r * .48;
        const px = x + Math.cos(a) * rr;
        const py = y + Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }

    function lerpColor(a, b, t) {
      const ah = parseInt(a.slice(1), 16);
      const bh = parseInt(b.slice(1), 16);
      const ar = ah >> 16, ag = (ah >> 8) & 255, ab = ah & 255;
      const br = bh >> 16, bg = (bh >> 8) & 255, bb = bh & 255;
      const rr = ar + t * (br - ar);
      const rg = ag + t * (bg - ag);
      const rb = ab + t * (bb - ab);
      return `rgb(${rr}, ${rg}, ${rb})`;
    }

    function beep(freq, duration, type) {
      if (muted) return;
      try {
        audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch {}
    }

    document.addEventListener("keydown", event => {
      const keys = {
        ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 }
      };
      if (keys[event.key]) {
        event.preventDefault();
        changeDirection(keys[event.key]);
        if (!running && !gameOver) startGame();
      }
      if (event.code === "Space") {
        event.preventDefault();
        pauseGame();
      }
      if (event.key === "r" || event.key === "R") restartGame();
    });

    let touchStart = null;
    shell.addEventListener("pointerdown", event => {
      touchStart = { x: event.clientX, y: event.clientY };
    });
    shell.addEventListener("pointerup", event => {
      if (!touchStart) return;
      const dx = event.clientX - touchStart.x;
      const dy = event.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 22) return;
      changeDirection(Math.abs(dx) > Math.abs(dy) ? { x: Math.sign(dx), y: 0 } : { x: 0, y: Math.sign(dy) });
      if (!running && !gameOver) startGame();
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => {
        const dirs = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
        changeDirection(dirs[button.dataset.dir]);
        if (!running && !gameOver) startGame();
      });
    });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("overlayStart").addEventListener("click", startGame);
    document.getElementById("pauseBtn").addEventListener("click", () => pauseGame());
    document.getElementById("resetBtn").addEventListener("click", restartGame);
    muteBtn.addEventListener("click", () => {
      muted = !muted;
      muteBtn.textContent = muted ? "×" : "♪";
    });

    document.getElementById("modeButtons").addEventListener("click", event => {
      if (!event.target.matches("button")) return;
      mode = event.target.dataset.mode;
      document.querySelectorAll("#modeButtons button").forEach(b => b.classList.toggle("active", b === event.target));
      restartGame();
      logEvent(`切换到${event.target.textContent}模式`, "#ffd166");
    });

    document.getElementById("difficultyButtons").addEventListener("click", event => {
      if (!event.target.matches("button")) return;
      difficulty = event.target.dataset.difficulty;
      document.querySelectorAll("#difficultyButtons button").forEach(b => b.classList.toggle("active", b === event.target));
      restartGame();
      logEvent(`难度：${event.target.textContent}`, "#ff6b6b");
    });

    resetState();
    draw(performance.now());
  </script>
</body>
</html>
