<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>谢华伟生日快乐</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      background: #fff7f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 210, 210, 0.9), transparent 28rem),
        radial-gradient(circle at 80% 75%, rgba(255, 230, 230, 0.85), transparent 24rem),
        #fffafa;
    }

    main {
      width: min(92vw, 980px);
      text-align: center;
      padding: 48px 24px;
    }

    h1 {
      margin: 0;
      color: #d60000;
      font-size: clamp(48px, 12vw, 150px);
      line-height: 1.08;
      font-weight: 900;
      text-shadow: 0 8px 24px rgba(214, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <main aria-label="生日祝福">
    <h1>谢华伟生日快乐</h1>
  </main>
</body>
</html>
